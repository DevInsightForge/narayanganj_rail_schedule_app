name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit belongs to main branch
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Verify tag matches pubspec version
        run: |
          PUBSPEC_VERSION=$(awk '/^version:/{print $2}' pubspec.yaml)
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "Unable to read pubspec version"
            exit 1
          fi

          EXPECTED_TAG="v${PUBSPEC_VERSION%%+*}"
          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec version $PUBSPEC_VERSION (expected $EXPECTED_TAG)"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Setup Java
        if: ${{ secrets.GOOGLE_PSA_JSON != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        if: ${{ secrets.GOOGLE_PSA_JSON != '' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        if: ${{ secrets.GOOGLE_PSA_JSON != '' }}
        run: flutter pub get

      - name: Build Android app bundle
        if: ${{ secrets.GOOGLE_PSA_JSON != '' }}
        run: flutter build appbundle --release

      - name: Upload to Google Play internal track
        if: ${{ secrets.GOOGLE_PSA_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PSA_JSON }}
          packageName: com.narayanganj.railschedule
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Note skipped Play upload
        if: ${{ secrets.GOOGLE_PSA_JSON == '' }}
        run: echo "GOOGLE_PSA_JSON not configured; skipped Google Play publish."
