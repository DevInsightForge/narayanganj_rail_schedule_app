name: Publish to Google Play (Internal)

on:
  push:
    tags:
      - 'v*'

jobs:
  publish_internal:
    if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' || secrets.GOOGLE_PSA_JSON != '' }}
    runs-on: ubuntu-latest
    env:
      PLAY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' && secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON || secrets.GOOGLE_PSA_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify publish secrets are available
        run: |
          if [ -z "${PLAY_JSON}" ]; then
            echo "Missing GOOGLE_PLAY_SERVICE_ACCOUNT_JSON or GOOGLE_PSA_JSON secret"
            exit 1
          fi

      - name: Verify tag commit belongs to main branch
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Verify tag matches pubspec version
        run: |
          PUBSPEC_VERSION=$(awk '/^version:/{print $2}' pubspec.yaml)
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "Unable to read pubspec version"
            exit 1
          fi

          EXPECTED_TAG="v${PUBSPEC_VERSION%%+*}"
          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec version $PUBSPEC_VERSION (expected $EXPECTED_TAG)"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android app bundle
        run: flutter build appbundle --release

      - name: Upload to Google Play internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.PLAY_JSON }}
          packageName: com.narayanganj.railschedule
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
