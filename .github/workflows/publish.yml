name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      GOOGLE_PSA_JSON: ${{ secrets.GOOGLE_PSA_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Generate runtime env file
        env:
          WEBSITE_BASE_URL: ${{ vars.WEBSITE_BASE_URL }}
        run: |
          if [ -z "$WEBSITE_BASE_URL" ]; then
            WEBSITE_BASE_URL="https://narayanganj-rail-schedule.pages.dev/"
          fi
          printf "WEBSITE_BASE_URL=%s\n" "$WEBSITE_BASE_URL" > .env

      - name: Verify tag commit belongs to main branch
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Verify tag matches pubspec version
        run: |
          PUBSPEC_VERSION=$(awk '/^version:/{print $2}' pubspec.yaml)
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "Unable to read pubspec version"
            exit 1
          fi

          EXPECTED_TAG="v${PUBSPEC_VERSION%%+*}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Tag $RELEASE_TAG does not match pubspec version $PUBSPEC_VERSION (expected $EXPECTED_TAG)"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ] || [ -z "$ANDROID_STORE_PASSWORD" ]; then
            echo "Android signing secrets are not configured."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build Android app bundle
        run: flutter build appbundle --release

      - name: Build ABI split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp build/app/outputs/bundle/release/app-release.aab release-assets/narayanganj-rail-schedule-${RELEASE_TAG}.aab
          cp build/app/outputs/flutter-apk/app-release.apk release-assets/narayanganj-rail-schedule-${RELEASE_TAG}-universal.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-assets/narayanganj-rail-schedule-${RELEASE_TAG}-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-assets/narayanganj-rail-schedule-${RELEASE_TAG}-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release-assets/narayanganj-rail-schedule-${RELEASE_TAG}-x86_64.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release-assets/*

      - name: Upload to Google Play internal track
        if: ${{ env.GOOGLE_PSA_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PSA_JSON }}
          packageName: com.narayanganj.railschedule
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Note skipped Play upload
        if: ${{ env.GOOGLE_PSA_JSON == '' }}
        run: echo "GOOGLE_PSA_JSON not configured; skipped Google Play publish."
