name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Verify tag commit belongs to main branch
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Verify tag matches pubspec version
        run: |
          PUBSPEC_VERSION=$(awk '/^version:/{print $2}' pubspec.yaml)
          if [ -z "$PUBSPEC_VERSION" ]; then
            echo "Unable to read pubspec version"
            exit 1
          fi

          EXPECTED_TAG="v${PUBSPEC_VERSION%%+*}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Tag $RELEASE_TAG does not match pubspec version $PUBSPEC_VERSION (expected $EXPECTED_TAG)"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing files
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$ANDROID_SIGNING_KEY" ]; then
            echo "ANDROID_SIGNING_KEY is not configured."
            exit 1
          fi

          echo "$ANDROID_SIGNING_KEY" | base64 --decode > /tmp/android-signing.tar.gz
          tar -xzf /tmp/android-signing.tar.gz -C android
          test -f android/key.properties
          test -f android/app/upload-keystore.jks

      - name: Build Android app bundle
        run: flutter build appbundle --release

      - name: Build ABI split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp build/app/outputs/bundle/release/app-release.aab release-assets/narayanganj-rail-schedule-${RELEASE_TAG}.aab
          cp build/app/outputs/flutter-apk/app-release.apk release-assets/narayanganj-rail-schedule-${RELEASE_TAG}-universal.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-assets/narayanganj-rail-schedule-${RELEASE_TAG}-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-assets/narayanganj-rail-schedule-${RELEASE_TAG}-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release-assets/narayanganj-rail-schedule-${RELEASE_TAG}-x86_64.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release-assets/*
