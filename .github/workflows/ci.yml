name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime env file
        env:
          WEBSITE_BASE_URL: ${{ vars.WEBSITE_BASE_URL }}
        run: |
          if [ -z "$WEBSITE_BASE_URL" ]; then
            WEBSITE_BASE_URL="https://narayanganj-rail-schedule.pages.dev/"
          fi
          printf "WEBSITE_BASE_URL=%s\n" "$WEBSITE_BASE_URL" > .env

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Android app bundle
        run: flutter build appbundle --release
