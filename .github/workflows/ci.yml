name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create dummy env file
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Notify CI failure
        if: failure()
        continue-on-error: true
        shell: bash
        env:
          NOTIFY_SCRIPT: ${{ secrets.NOTIFY_SCRIPT }}
        run: |
          message="CI failed. repository=${{ github.repository }} ref_name=${{ github.ref_name }} actor=${{ github.actor }} sha=${{ github.sha }}"
          if [ -n "$NOTIFY_SCRIPT" ]; then
            printf '%s\n' "$NOTIFY_SCRIPT" > /tmp/notify.sh
            chmod 700 /tmp/notify.sh
            /tmp/notify.sh "$message"
          else
            echo "Notification script unavailable; skipping."
          fi

