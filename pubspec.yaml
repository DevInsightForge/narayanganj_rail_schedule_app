name: narayanganj_rail_schedule
description: "Mobile-first commuter rail schedule app for Dhaka and Narayanganj route planning."
publish_to: 'none'
version: 0.3.0+6

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  bloc: ^9.0.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^5.2.1
  http: ^1.5.0
  shared_preferences: ^2.5.3
  timelines_plus: ^2.0.0
  url_launcher: ^6.3.2
  web: ^1.1.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/branding/app-icon.png
    background_color: "#171717"
    theme_color: "#171717"
  windows:
    generate: true
    image_path: assets/branding/app-icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/app-icon.png
  image_path: assets/branding/app-icon.png
  adaptive_icon_background: "#171717"
  adaptive_icon_foreground: assets/branding/app-icon.png
