name: narayanganj_rail_schedule
description: "Mobile-first commuter rail schedule app for Dhaka and Narayanganj route planning."
publish_to: 'none'
version: 1.5.2+22

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  bloc: ^9.0.0
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  firebase_app_check: ^0.4.3
  firebase_auth: ^6.4.0
  firebase_crashlytics: ^5.2.0
  firebase_core: ^4.7.0
  firebase_remote_config: ^6.4.0
  cloud_firestore: ^6.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/branding/app-icon.png
    background_color: "#171717"
    theme_color: "#171717"
  windows:
    generate: true
    image_path: assets/branding/app-icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/app-icon.png
  image_path: assets/branding/app-icon.png
  adaptive_icon_background: "#171717"
  adaptive_icon_foreground: assets/branding/app-icon.png
